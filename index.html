<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EnStandard – NeTEx Profile Documentation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="assets/glossary-tooltip.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'EnStandard NeTEx Profile',
      repo: 'https://github.com/hfjelstad/Profile_Documentation_v2',
      loadSidebar: true,
      subMaxLevel: 2,
      search: {
        placeholder: 'Search documentation...',
        noData: 'No results found.',
        depth: 6
      },
      relativePath: true,
      auto2top: true,
      tabs: {
        persist: true,
        sync: true,
        theme: 'classic'
      },
      plugins: [
        function giscusPlugin(hook) {
          var giscusContainer = '<div id="giscus-container"><script ' +
            'src="https://giscus.app/client.js" ' +
            'data-repo="hfjelstad/Profile_Documentation_v2" ' +
            'data-repo-id="R_kgDORM6n6Q" ' +
            'data-category="Documentation Feedback" ' +
            'data-category-id="DIC_kwDORM6n6c4C5Fxl" ' +
            'data-mapping="pathname" ' +
            'data-strict="0" ' +
            'data-reactions-enabled="1" ' +
            'data-emit-metadata="0" ' +
            'data-input-position="top" ' +
            'data-theme="preferred_color_scheme" ' +
            'data-lang="en" ' +
            'data-loading="lazy" ' +
            'crossorigin="anonymous" ' +
            'async><\/script></div>';

          hook.afterEach(function(html) {
            return html + '<hr style="margin-top:3em">' +
              '<h2>💬 Feedback</h2>' +
              '<p>Have questions or suggestions about this page? Leave a comment below.</p>' +
              giscusContainer;
          });

          hook.doneEach(function() {
            var existing = document.querySelector('#giscus-container iframe');
            if (existing) existing.remove();
            var container = document.querySelector('#giscus-container');
            if (container) {
              var script = document.createElement('script');
              script.src = 'https://giscus.app/client.js';
              script.setAttribute('data-repo', 'hfjelstad/Profile_Documentation_v2');
              script.setAttribute('data-repo-id', 'R_kgDORM6n6Q');
              script.setAttribute('data-category', 'Documentation Feedback');
              script.setAttribute('data-category-id', 'DIC_kwDORM6n6c4C5Fxl');
              script.setAttribute('data-mapping', 'pathname');
              script.setAttribute('data-strict', '0');
              script.setAttribute('data-reactions-enabled', '1');
              script.setAttribute('data-emit-metadata', '0');
              script.setAttribute('data-input-position', 'top');
              script.setAttribute('data-theme', 'preferred_color_scheme');
              script.setAttribute('data-lang', 'en');
              script.setAttribute('data-loading', 'lazy');
              script.crossOrigin = 'anonymous';
              container.innerHTML = '';
              container.appendChild(script);
            }
          });
        }
      ]
    };
  </script>
  <!-- Mermaid -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
  </script>
  <!-- Glossary tooltip plugin (must load before Docsify core) -->
  <script src="assets/docsify-glossary-tooltip.js"></script>
  <!-- Docsify core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- Search plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- Copy code button on all code blocks -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <!-- Tabs plugin -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-tabs@1/dist/docsify-tabs.min.js"></script>
  <!-- Flexible alerts (> [!NOTE], > [!WARNING], > [!TIP]) -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-plugin-flexible-alerts@1"></script>
</body>
</html>
