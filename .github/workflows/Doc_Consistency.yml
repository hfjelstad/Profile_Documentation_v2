name: Documentation Consistency Check

on:
  push:
    branches: [EnStandardBranch, main]
    paths:
      - "Frames/**"
      - "Objects/**"
      - "Guides/**"
      - "_sidebar.md"
      - "scripts/check-doc-consistency.py"
  pull_request:
    paths:
      - "Frames/**"
      - "Objects/**"
      - "Guides/**"
      - "_sidebar.md"
      - "scripts/check-doc-consistency.py"

jobs:
  consistency:
    name: Check doc consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install lxml

      - name: Table-vs-XML order check (Frames)
        run: python scripts/check-doc-consistency.py --order-only --target Frames

      - name: Description-vs-Table check (Frames)
        run: python scripts/check-doc-consistency.py --desc-only --target Frames

      - name: Table-vs-XML order check (Objects)
        run: python scripts/check-doc-consistency.py --order-only --target Objects

      - name: Description-vs-Table check (Objects)
        run: python scripts/check-doc-consistency.py --desc-only --target Objects

      - name: Sidebar completeness check
        run: python scripts/check-doc-consistency.py --sidebar-only
