name: Validate NeTEx XML (changed files only)

on:
  push:
    paths:
      - "**/*.xml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.xml"

jobs:
  validate-netex-xml:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      #####################################################################
      # 🔥 FORCE: Always fetch origin/main so schema checkout works on push
      #####################################################################

      - name: Ensure main is fetched
        run: |
          git remote set-branches origin '*'
          git fetch origin main --depth=1

      - name: Fetch schema folder from main
        run: |
          set -euo pipefail
          git checkout origin/main -- "XSD 2.0/xsd/"
          echo "Schema folder from origin/main loaded:"
          ls -lah "XSD 2.0/xsd/" || true

      ######################################

      - name: Install xmllint
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils

      - name: Validate only changed XML files
        shell: bash
        run: |
          set -euo pipefail

          echo "PWD: $(pwd)"
          ls -lah

          SCHEMA_FILE="XSD 2.0/xsd/NeTEx_publication.xsd"
          if [ ! -f "$SCHEMA_FILE" ]; then
            echo "ERROR: Schema not found at $SCHEMA_FILE"
            exit 1
          fi

          SCHEMA_ABS="$(realpath "$SCHEMA_FILE")"
          SCHEMA_URI="file://$SCHEMA_ABS"
          SCHEMA_DIR="$(dirname "$SCHEMA_ABS")"
          SCHEMA_PATHS="$SCHEMA_DIR"

          echo "Using schema: $SCHEMA_URI"
          echo "Schema search paths: $SCHEMA_PATHS"

          # --------------------
          # Determine diff
          # --------------------
          DIFF=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            git fetch origin "${{ github.head_ref }}" --depth=1
            DIFF=$(git diff --name-only -z "origin/${{ github.base_ref }}" "origin/${{ github.head_ref }}")
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            ZERO40="0000000000000000000000000000000000000000"

            if [ -z "$BEFORE" ] || [ "$BEFORE" = "$ZERO40" ]; then
              echo "First push or unknown before-sha. Using merge-base diff."
              git fetch origin main --depth=1
              MERGE_BASE=$(git merge-base "$AFTER" "origin/main" || true)
              if [ -n "$MERGE_BASE" ]; then
                DIFF=$(git diff --name-only -z "$MERGE_BASE" "$AFTER")
              else
                DIFF=$(git diff-tree --no-commit-id --name-only -z -r "$AFTER")
              fi
            else
              DIFF=$(git diff --name-only -z "$BEFORE" "$AFTER")
            fi
          fi

          echo "Changed files (raw diff):"
          printf '%s' "$DIFF" | tr '\0' '\n' | sed '/^$/d'

          STATUS=0
          FOUND_XML=0

          while IFS= read -r -d '' file; do
            shopt -s nocasematch
            if [[ "$file" != *.xml ]]; then
              shopt -u nocasematch
              continue
            fi
            shopt -u nocasematch

            if [ ! -f "$file" ]; then
              echo "Skipping deleted file: $file"
              continue
            fi

            FOUND_XML=1
            echo "Validating: $file"

            if ! xmllint --schema "$SCHEMA_URI" --path "$SCHEMA_PATHS" --noout "$file"; then
              echo "❌ Validation failed: $file"
              STATUS=1
            else
              echo "✅ OK: $file"
            fi
          done < <(printf '%s' "$DIFF")

          if [ "$FOUND_XML" -eq 0 ]; then
            echo "No changed XML files found."
          fi

          exit $STATUS
