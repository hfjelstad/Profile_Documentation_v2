name: External NeTEx validator

on:
  workflow_dispatch:
    inputs:
      xmlContent:
        description: "Raw XML to validate"
        required: true
        type: string

permissions:
  contents: read

jobs:
  NeTEx_External:
    runs-on: ubuntu-latest

    # Outputs som Power Automate henter fra /jobs API
    outputs:
      errors: ${{ steps.result.outputs.errors }}
      exitCode: ${{ steps.validate.outputs.exitCode }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write XML to file (heredoc-safe)
        shell: bash
        run: |
          cat > input.xml <<'EOF_XML'
          ${{ github.event.inputs.xmlContent }}
          EOF_XML

      - name: Output input.xml (for inspection)
        shell: bash
        run: |
          echo "===== BEGIN input.xml ====="
          nl -ba input.xml | sed -n '1,200p'
          echo "==========================="

      - name: Install validator
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Normalize line endings
        shell: bash
        run: sed -i 's/\r$//' input.xml

      - name: Register xmllint problem matcher
        shell: bash
        run: |
          cat > .xmllint-matcher.json <<'JSON'
          {
            "problemMatcher": [
              {
                "owner": "xmllint",
                "pattern": [
                  {
                    "regexp": "^(.+?):([0-9]+):([0-9]+):\\s+(error|warning)\\s+:\\s+(.*)$",
                    "file": 1,
                    "line": 2,
                    "column": 3,
                    "severity": 4,
                    "message": 5
                  }
                ]
              }
            ]
          }
          JSON
          echo "::add-matcher::.xmllint-matcher.json"

      # 🔥 NY ROBUST VALIDATOR — garanterer riktig exitCode basert på stderr-innhold
      - name: Validate with NeTEx XSD
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          SCHEMA_PATH="XSD 2.0/xsd/NeTEx_publication.xsd"

          # Sjekk at XSD finnes
          if [ ! -f "$SCHEMA_PATH" ]; then
            echo "::error::Schema file missing: $SCHEMA_PATH"
            echo "Schema file missing: $SCHEMA_PATH" > xmllint.err
            : > xmllint.out
            EXIT_CODE=2
          else
            # Kjør xmllint – ikke stol på exitCode, bruk stderr for feil
            xmllint --schema "$SCHEMA_PATH" input.xml \
              1> xmllint.out \
              2> xmllint.err

            if [ -s xmllint.err ]; then
              # Vi fant feil i stderr → validering feilet
              EXIT_CODE=1
            else
              EXIT_CODE=0
            fi
          fi

          # Garanter at stderr ikke er tom ved feil
          if [ $EXIT_CODE -ne 0 ] && [ ! -s xmllint.err ]; then
            echo "(xmllint feilet, men stderr var tom — mulig parseravbrudd)" > xmllint.err
          fi

          echo "exitCode=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          echo "---- FIRST 50 LINES OF STDOUT ----"
          sed -n '1,50p' xmllint.out || true

          echo "---- FIRST 200 LINES OF STDERR ----"
          sed -n '1,200p' xmllint.err || true

      # 📤 Sett errors-output *kun dersom validering feilet*
      - name: Set output (errors)
        id: result
        if: always()
        shell: bash
        run: |
          EXIT_CODE="${{ steps.validate.outputs.exitCode }}"
          if [ "$EXIT_CODE" != "0" ]; then
            {
              echo "errors<<EOF_ERRORS"
              sed -n '1,400p' xmllint.err
              echo "EOF_ERRORS"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Add Job Summary
        if: always()
        shell: bash
        run: |
          EXIT_CODE="${{ steps.validate.outputs.exitCode }}"
          echo "## NeTEx validation result" >> $GITHUB_STEP_SUMMARY
          if [ "$EXIT_CODE" = "0" ]; then
            echo "**Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stderr" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          sed -n '1,200p' xmllint.err | sed 's/^/    /' >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: netex-validation-logs
          path: |
            input.xml
            xmllint.out
            xmllint.err

      # ❗ Feil jobben hvis valideringen faktisk feilet
      - name: Fail job if validation failed
        if: ${{ steps.validate.outputs.exitCode != '0' }}
        run: exit 1
