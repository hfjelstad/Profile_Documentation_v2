name: External NeTEx validator

on:
  workflow_dispatch:
    inputs:
      xmlContent:
        description: "Raw XML content to validate"
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      exitCode: ${{ steps.collect.outputs.exitCode }}
      errors:   ${{ steps.collect.outputs.errors }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write input.xml
        shell: bash
        run: |
          cat > input.xml <<'EOF'
          ${{ github.event.inputs.xmlContent }}
          EOF

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Normalize line endings
        run: sed -i 's/\r$//' input.xml

      - name: Validate with NeTEx schema
        id: validate
        shell: bash
        run: |
          SCHEMA="XSD 2.0/xsd/NeTEx_publication.xsd"
          : > xmllint.out
          : > xmllint.err

          if [ ! -f "$SCHEMA" ]; then
            echo 2 > exitcode.txt
            echo "Schema missing: $SCHEMA" > xmllint.err
            echo "::error title=Schema missing::$SCHEMA"
            exit 0
          fi

          # Run xmllint and capture real exit code without letting -e abort the step
          set +e
          xmllint --noout --schema "$SCHEMA" input.xml 1>xmllint.out 2>xmllint.err
          status=$?
          set -e

          echo "$status" > exitcode.txt
          echo "xmllint exit code: $status"

          if [ "$status" -eq 0 ]; then
            # Ensure stderr is empty on success
            : > xmllint.err
          else
            # If no details, add a single fallback line
            [ -s xmllint.err ] || echo "(Validation failed but xmllint produced no details)" > xmllint.err
            echo "::error title=NeTEx validation failed::See artifacts for details"
          fi

      - name: Collect outputs
        id: collect
        if: always()
        shell: bash
        run: |
          code=$(cat exitcode.txt 2>/dev/null || echo 1)
          echo "exitCode=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -ne 0 ]; then
            {
              echo "errors<<EOF"
              sed -n '1,400p' xmllint.err
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: netex-validation-logs
          path: |
            input.xml
            xmllint.out
            xmllint.err
            exitcode.txt
          if-no-files-found: ignore

      - name: Fail if invalid
        if: ${{ steps.collect.outputs.exitCode != '0' }}
        run: exit 1
