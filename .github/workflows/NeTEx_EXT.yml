name: External NeTEx validator

on:
  workflow_dispatch:
    inputs:
      xmlContent:
        description: "Raw XML content to validate"
        required: true
        type: string

permissions:
  contents: read

jobs:
  NeTEx_External:
    runs-on: ubuntu-latest

    # Exposed to API consumers (e.g., Power Automate)
    outputs:
      errors: ${{ steps.collect.outputs.errors }}
      exitCode: ${{ steps.collect.outputs.exitCode }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Store XML input to file
        shell: bash
        run: |
          cat > input.xml <<'EOF_XML'
          ${{ github.event.inputs.xmlContent }}
          EOF_XML

      - name: Install validator
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Normalize line endings
        shell: bash
        run: sed -i 's/\r$//' input.xml

      - name: Register xmllint problem matcher
        shell: bash
        run: |
          cat > .xmllint-matcher.json <<'JSON'
          {
            "problemMatcher": [
              {
                "owner": "xmllint",
                "pattern": [
                  {
                    "regexp": "^(.+?):([0-9]+):([0-9]+):\\s+(error|warning)\\s+:\\s+(.*)$",
                    "file": 1,
                    "line": 2,
                    "column": 3,
                    "severity": 4,
                    "message": 5
                  }
                ]
              }
            ]
          }
          JSON
          echo "::add-matcher::.xmllint-matcher.json"

      # Ensure logs exist so downstream steps never fail on 'file not found'
      - name: Prepare log files
        shell: bash
        run: |
          : > xmllint.out
          : > xmllint.err
          : > exitcode.txt

      # ---------------------------------------------
      #   ✅ VALIDATION — trust xmllint exit code
      #   (do not 'exit 1' here; we gate at the end)
      # ---------------------------------------------
      - name: Validate XML using NeTEx schema
        id: validate
        shell: bash
        run: |
          SCHEMA_PATH="XSD 2.0/xsd/NeTEx_publication.xsd"

          # 1) Schema presence
          if [ ! -f "$SCHEMA_PATH" ]; then
            echo "2" > exitcode.txt
            echo "Schema missing: $SCHEMA_PATH" > xmllint.err
            echo "::error title=Schema Missing::$SCHEMA_PATH not found"
            exit 0
          fi

          # 2) Run xmllint; '--noout' suppresses the "validates" message
          xmllint --noout --schema "$SCHEMA_PATH" input.xml \
            1> xmllint.out \
            2> xmllint.err
          EXIT_CODE=$?

          echo "$EXIT_CODE" > exitcode.txt

          # 3) Only annotate as error if validation failed
          if [ "$EXIT_CODE" -ne 0 ]; then
            # If tool produced no stderr, write a minimal fallback
            if [ ! -s xmllint.err ]; then
              echo "(Validation failed but no details were produced by xmllint)" > xmllint.err
            fi
            echo "::error title=NeTEx validation failed::See details in summary/artifacts"
          fi

          # Do NOT exit 1 here; downstream steps will still run
          exit 0

      # ---------------------------------------------
      #   📤 COLLECT OUTPUTS — for Power Automate
      # ---------------------------------------------
      - name: Collect output for Power Automate
        id: collect
        if: always()
        shell: bash
        run: |
          EXIT_CODE=$(cat exitcode.txt 2>/dev/null || echo "1")
          echo "exitCode=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ "$EXIT_CODE" -ne 0 ]; then
            {
              echo "errors<<EOF"
              sed -n '1,400p' xmllint.err
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      # ---------------------------------------------
      #   📝 SUMMARY — never fail on success
      # ---------------------------------------------
      - name: Add summary
        if: always()
        shell: bash
        run: |
          set +e
          EXIT_CODE=$(cat exitcode.txt 2>/dev/null || echo "1")
          {
            echo "## NeTEx Validation Result"
            echo
            if [ "$EXIT_CODE" -eq 0 ]; then
              echo "**Status:** ✅ Success"
            else
              echo "**Status:** ❌ Failed"
            fi
            echo
            if [ -s xmllint.err ]; then
              echo "### Stderr (first 200 lines)"
              echo
              sed -n '1,200p' xmllint.err | sed 's/^/    /'
              echo
            fi
            if [ -s xmllint.out ]; then
              echo "### Stdout (first 200 lines)"
              echo
              sed -n '1,200p' xmllint.out | sed 's/^/    /'
              echo
            fi
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: netex-validation-logs
          path: |
            input.xml
            xmllint.out
            xmllint.err
            exitcode.txt
          if-no-files-found: ignore

      # ---------------------------------------------
      #   🚦 FINAL GATE — fail only if exitCode != 0
      # ---------------------------------------------
      - name: Fail job if validation failed
        if: ${{ steps.collect.outputs.exitCode != '0' }}
        shell: bash
        run: exit 1
