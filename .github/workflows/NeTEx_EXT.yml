name: External NeTEx validator (fail fast)

on:
  workflow_dispatch:
    inputs:
      xmlContent:
        description: "Raw XML to validate"
        required: true
        type: string

jobs:
  NeTEx_External:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Install validator
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Write XML to file
        shell: bash
        run: |
          set -euo pipefail
          # Write the XML verbatim; printf avoids echo+quote issues
          printf '%s' "${{ github.event.inputs.xmlContent }}" > input.xml

      - name: Validate with NeTEx XSD (fail fast)
        shell: bash
        run: |
          set -euo pipefail
          xmllint --noout --schema "XSD 2.0/xsd/NeTEx_publication.xsd" input.xml
          # If xmllint finds an error it exits non‑zero and the job stops here
