name: External NeTEx validator

on:
  workflow_dispatch:
    inputs:
      xmlContent:
        description: "Raw XML content to validate"
        required: true
        type: string

permissions:
  contents: read

jobs:
  NeTEx_External:
    runs-on: ubuntu-latest

    outputs:
      errors: ${{ steps.collect.outputs.errors }}
      exitCode: ${{ steps.collect.outputs.exitCode }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Store XML input to file
        shell: bash
        run: |
          cat > input.xml <<'EOF_XML'
          ${{ github.event.inputs.xmlContent }}
          EOF_XML

      - name: Install validator
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Normalize line endings
        shell: bash
        run: sed -i 's/\r$//' input.xml

      - name: Register xmllint problem matcher
        shell: bash
        run: |
          cat > .xmllint-matcher.json <<'JSON'
          {
            "problemMatcher": [
              {
                "owner": "xmllint",
                "pattern": [
                  {
                    "regexp": "^(.+?):([0-9]+):([0-9]+):\\s+(error|warning)\\s+:\\s+(.*)$",
                    "file": 1,
                    "line": 2,
                    "column": 3,
                    "severity": 4,
                    "message": 5
                  }
                ]
              }
            ]
          }
          JSON
          echo "::add-matcher::.xmllint-matcher.json"

      # ---------------------------------------------
      #   ⭐ VALIDATION STEP (MUST NEVER EXIT 1)
      # ---------------------------------------------
      - name: Validate XML using NeTEx schema
        id: validate
        shell: bash
        run: |
          SCHEMA_PATH="XSD 2.0/xsd/NeTEx_publication.xsd"

          # 1) Schema check
          if [ ! -f "$SCHEMA_PATH" ]; then
            echo "::error title=Schema Missing::$SCHEMA_PATH not found"
            echo "Schema missing: $SCHEMA_PATH" > xmllint.err
            : > xmllint.out
            echo "2" > exitcode.txt
            exit 0
          fi

          # 2) Run xmllint
          xmllint --schema "$SCHEMA_PATH" input.xml \
            1> xmllint.out \
            2> xmllint.err

          # 3) Determine failure based on stderr
          if [ -s xmllint.err ]; then
            echo "::error title=NeTEx Validation Failed::See stderr output"
            echo "1" > exitcode.txt
          else
            echo "0" > exitcode.txt
          fi

          # Fallback if stderr is unexpectedly empty on error
          if [ "$(cat exitcode.txt)" != "0" ] && [ ! -s xmllint.err ]; then
            echo "(Validator failed but produced no stderr — parser aborted early)" > xmllint.err
          fi

          # IMPORTANT: Do NOT exit 1 here. That breaks output forwarding.
          exit 0

      # ---------------------------------------------
      #   ⭐ COLLECT OUTPUTS (SAFE STEP)
      #   This step ALWAYS runs and ALWAYS sets job outputs.
      # ---------------------------------------------
      - name: Collect output for Power Automate
        id: collect
        if: always()
        shell: bash
        run: |
          EXIT_CODE=$(cat exitcode.txt 2>/dev/null || echo "1")
          echo "exitCode=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ "$EXIT_CODE" != "0" ]; then
            {
              echo "errors<<EOF"
              sed -n '1,400p' xmllint.err
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Add summary
        if: always()
        shell: bash
        run: |
          EXIT_CODE=$(cat exitcode.txt)
          echo "## NeTEx Validation Result" >> $GITHUB_STEP_SUMMARY

          if [ "$EXIT_CODE" = "0" ]; then
            echo "**Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stderr output" >> $GITHUB_STEP_SUMMARY
          sed -n '1,200p' xmllint.err | sed 's/^/    /' >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: netex-validation-logs
          path: |
            input.xml
            xmllint.out
            xmllint.err
            exitcode.txt

      # ---------------------------------------------
      #   ⭐ FINAL FAILURE GATE (NOW RELIABLE)
      # ---------------------------------------------
      - name: Fail job if validation failed
        if: ${{ steps.collect.outputs.exitCode != '0' }}
        run: exit 1
