name: External NeTEx validator

on:
  workflow_dispatch:
    inputs:
      xmlContent:
        description: "Raw XML content to validate"
        required: true
        type: string

permissions:
  contents: read

jobs:
  NeTEx_External:
    runs-on: ubuntu-latest

    outputs:
      errors: ${{ steps.collect.outputs.errors }}
      exitCode: ${{ steps.collect.outputs.exitCode }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Store XML input to file
        shell: bash
        run: |
          cat > input.xml <<'EOF_XML'
          ${{ github.event.inputs.xmlContent }}
          EOF_XML

      - name: Install validator
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Normalize line endings
        shell: bash
        run: sed -i 's/\r$//' input.xml

      - name: Register xmllint problem matcher
        shell: bash
        run: |
          cat > .xmllint-matcher.json <<'JSON'
          {
            "problemMatcher": [
              {
                "owner": "xmllint",
                "pattern": [
                  {
                    "regexp": "^(.+?):([0-9]+):([0-9]+):\\s+(error|warning)\\s+:\\s+(.*)$",
                    "file": 1,
                    "line": 2,
                    "column": 3,
                    "severity": 4,
                    "message": 5
                  }
                ]
              }
            ]
          }
          JSON
          echo "::add-matcher::.xmllint-matcher.json"

      # Pre-create log files so later steps never fail on 'file not found'
      - name: Prepare log files
        shell: bash
        run: |
          : > xmllint.out
          : > xmllint.err
          : > exitcode.txt

      # ---------------------------------------------
      #   ⭐ VALIDATION STEP (MUST NEVER EXIT 1)
      # ---------------------------------------------
      - name: Validate XML using NeTEx schema
        id: validate
        shell: bash
        run: |
          SCHEMA_PATH="XSD 2.0/xsd/NeTEx_publication.xsd"

          # 1) Schema check
          if [ ! -f "$SCHEMA_PATH" ]; then
            echo "::error title=Schema Missing::$SCHEMA_PATH not found"
            echo "Schema missing: $SCHEMA_PATH" > xmllint.err
            echo "2" > exitcode.txt
            exit 0
          fi

          # 2) Run xmllint (stdout/stderr to files)
          xmllint --schema "$SCHEMA_PATH" input.xml \
            1> xmllint.out \
            2> xmllint.err

          # 3) Determine failure based on stderr content
          if [ -s xmllint.err ]; then
            echo "::error title=NeTEx Validation Failed::See stderr output"
            echo "1" > exitcode.txt
          else
            echo "0" > exitcode.txt
          fi

          # Fallback if stderr unexpectedly empty on error
          if [ "$(cat exitcode.txt)" != "0" ] && [ ! -s xmllint.err ]; then
            echo "(Validator failed but produced no stderr — parser aborted early)" > xmllint.err
          fi

          # Do NOT exit 1 here. We will fail the job at the final gate only if needed.
          exit 0

      # ---------------------------------------------
      #   ⭐ COLLECT OUTPUTS (SAFE STEP)
      # ---------------------------------------------
      - name: Collect output for Power Automate
        id: collect
        if: always()
        shell: bash
        run: |
          EXIT_CODE=$(cat exitcode.txt 2>/dev/null || echo "1")
          echo "exitCode=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ "$EXIT_CODE" != "0" ]; then
            {
              echo "errors<<EOF"
              sed -n '1,400p' xmllint.err
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Add summary
        if: always()
        shell: bash
        run: |
          # DO NOT enable 'set -e' or 'pipefail' here. We don't want summary to fail the job.
          EXIT_CODE=$(cat exitcode.txt 2>/dev/null || echo "1")
          {
            echo "## NeTEx Validation Result"
            echo ""
            if [ "$EXIT_CODE" = "0" ]; then
              echo "**Status:** ✅ Success"
            else
              echo "**Status:** ❌ Failed"
            fi
            echo ""
            echo "### Stdout (first 200 lines)"
            echo ""
            sed -n '1,200p' xmllint.out | sed 's/^/    /' || true
            echo ""
            echo "### Stderr (first 200 lines)"
            echo ""
            # Guard: if file is empty or missing, this won't fail the step
            sed -n '1,200p' xmllint.err | sed 's/^/    /' || true
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: netex-validation-logs
          path: |
            input.xml
            xmllint.out
            xmllint.err
            exitcode.txt
          if-no-files-found: ignore    # <- prevent failure if any are missing

      # ---------------------------------------------
      #   ⭐ FINAL FAILURE GATE (ONLY IF EXITCODE != 0)
      # ---------------------------------------------
      - name: Fail job if validation failed
        if: ${{ steps.collect.outputs.exitCode != '0' }}
        shell: bash
        run: exit 1
