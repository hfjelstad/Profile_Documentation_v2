name: External NeTEx validator

on:
  workflow_dispatch:
    inputs:
      xmlContent:
        description: "Raw XML to validate"
        required: true
        type: string

jobs:
  NeTEx_External:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Write XML to file
        shell: bash
        run: |
          # If you later switch to base64, replace the next line with:
          # echo "${{ github.event.inputs.xmlContentB64 }}" | base64 -d > input.xml
          echo "${{ github.event.inputs.xmlContent }}" > input.xml

      - name: Install validator
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Validate with NeTEx XSD (capture exit code + messages)
        id: validate
        shell: bash
        run: |
          # Ensure no stale content
          : > errors.txt

          # Run validator; capture stderr to file but DO NOT fail the step on non-zero yet
          set +e
          xmllint --noout --schema "XSD 2.0/xsd/NeTEx_publication.xsd" input.xml 2> errors.txt
          exit_code=$?
          set -e

          echo "Validator exit code: $exit_code"
          # Show messages in logs for convenience
          if [ -s errors.txt ]; then
            echo "Validator messages:"
            sed -n '1,200p' errors.txt
          else
            echo "No validator messages."
          fi

          # Expose multi-line output for flows/agents
          {
            echo "errors<<EOF"
            cat errors.txt || true
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Also expose exit code as an output
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Upload validation errors (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation
          path: errors.txt
          if-no-files-found: ignore

      - name: Final gate (fail only if validator exit code != 0)
        if: always()
        shell: bash
        run: |
          if [ "${{ steps.validate.outputs.exit_code }}" != "0" ]; then
            echo "Validation failed (exit code ${{ steps.validate.outputs.exit_code }})"
            exit 1
          else
            echo "Validation succeeded (exit code 0)"
          fi

    outputs:
      errors: ${{ steps.validate.outputs.errors }}
