name: External NeTEx validator

on:
  workflow_dispatch:
    inputs:
      xmlContent:
        description: "Raw XML to validate"
        required: true
        type: string

permissions:
  contents: read

jobs:
  NeTEx_External:
    runs-on: ubuntu-latest

    # Eksponert til Power Automate via /runs/{id}/jobs
    outputs:
      errors: ${{ steps.result.outputs.errors }}
      exitCode: ${{ steps.result.outputs.exitCode }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write XML to file (heredoc-safe)
        shell: bash
        run: |
          cat > input.xml <<'EOF_XML'
          ${{ github.event.inputs.xmlContent }}
          EOF_XML

      - name: Show input.xml (first 200 lines)
        shell: bash
        run: |
          nl -ba input.xml | sed -n '1,200p'

      - name: Install validator
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Normalize line endings
        shell: bash
        run: sed -i 's/\r$//' input.xml

      - name: Register xmllint problem matcher
        shell: bash
        run: |
          cat > .xmllint-matcher.json <<'JSON'
          {
            "problemMatcher": [
              {
                "owner": "xmllint",
                "pattern": [
                  {
                    "regexp": "^(.+?):([0-9]+):([0-9]+):\\s+(error|warning)\\s+:\\s+(.*)$",
                    "file": 1,
                    "line": 2,
                    "column": 3,
                    "severity": 4,
                    "message": 5
                  }
                ]
              }
            ]
          }
          JSON
          echo "::add-matcher::.xmllint-matcher.json"

      # ⭐ Robust validator – ingen continue-on-error
      - name: Validate with NeTEx XSD
        id: validate
        shell: bash
        run: |
          set -o pipefail
          SCHEMA_PATH="XSD 2.0/xsd/NeTEx_publication.xsd"

          # 1️⃣ Sjekk at schema finnes
          if [ ! -f "$SCHEMA_PATH" ]; then
            echo "Schema file missing: $SCHEMA_PATH" > xmllint.err
            : > xmllint.out
            echo "::error title=Schema missing::$SCHEMA_PATH not found"
            EXIT_CODE=2
          else
            # 2️⃣ Kjør xmllint (ikke stol på exit-code)
            xmllint --schema "$SCHEMA_PATH" input.xml \
              1> xmllint.out \
              2> xmllint.err

            # 3️⃣ Hvis stderr har innhold → valideringsfeil
            if [ -s xmllint.err ]; then
              echo "::error title=NeTEx validation failed::Errors found in XML"
              EXIT_CODE=1
            else
              EXIT_CODE=0
            fi
          fi

          # 4️⃣ fallback hvis stderr uforståelig tom
          if [ "$EXIT_CODE" != "0" ] && [ ! -s xmllint.err ]; then
            echo "(xmllint feilet, men stderr var tom — mulig parser-avbrudd)" > xmllint.err
          fi

          # 5️⃣ LAST: skriv exitCode TIL workflow-outputs
          echo "exitCode=$EXIT_CODE" >> $GITHUB_OUTPUT

      # ⭐ Sett errors-output kun ved feil
      - name: Set workflow outputs
        id: result
        if: always()
        shell: bash
        run: |
          EXIT_CODE="${{ steps.validate.outputs.exitCode }}"
          echo "exitCode=${EXIT_CODE}" >> $GITHUB_OUTPUT

          if [ "$EXIT_CODE" != "0" ]; then
            {
              echo "errors<<EOF"
              sed -n '1,400p' xmllint.err
              echo "EOF"
            } >> $GITHUB_OUTPUT
          fi

      - name: Add Job Summary
        if: always()
        shell: bash
        run: |
          EXIT_CODE="${{ steps.validate.outputs.exitCode }}"
          echo "## NeTEx validation result" >> $GITHUB_STEP_SUMMARY
          if [ "$EXIT_CODE" = "0" ]; then
            echo "**Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stderr (first 200 lines)" >> $GITHUB_STEP_SUMMARY
          sed -n '1,200p' xmllint.err | sed 's/^/    /' >> $GITHUB_STEP_SUMMARY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: netex-validation-logs
          path: |
            input.xml
            xmllint.out
            xmllint.err

      # 🚨 Feiler jobben hvis valideringen feilet
      - name: Fail job if validation failed
        if: ${{ steps.validate.outputs.exitCode != '0' }}
        run: exit 1
